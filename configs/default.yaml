# EV-DT: Default Configuration
# Return-Conditioned Emergency Corridor Optimization

# --- Environment ---
env:
  network: "grid-4x4-v0"          # LightSim scenario
  ev_speed_factor: 1.5             # EV speed multiplier over free-flow
  ev_spawn_rate: 0.1               # EV spawn probability per episode step
  max_episode_steps: 300           # ~25 min simulated at 5s intervals
  decision_interval: 5             # seconds between agent decisions
  preemption_advance: 3            # cells ahead to start preemption
  background_demand_rate: 0.3      # vehicles/sec on boundary links

# --- Dataset ---
dataset:
  num_episodes: 5000               # episodes for offline dataset
  expert_policy: "greedy_preempt"  # policy for data collection
  mixed_quality: true              # include suboptimal trajectories
  suboptimal_ratio: 0.3            # fraction of random/suboptimal episodes
  save_path: "data/offline_dataset.h5"

# --- Decision Transformer ---
dt:
  context_length: 30               # trajectory context window
  n_layers: 4                      # transformer layers
  n_heads: 4                       # attention heads
  embed_dim: 128                   # embedding dimension
  dropout: 0.1
  activation: "gelu"
  max_ep_len: 300                  # max episode length
  lr: 1e-4
  weight_decay: 1e-4
  warmup_steps: 1000
  batch_size: 64
  num_epochs: 100
  eval_interval: 10
  target_returns: [0.0, -50.0, -100.0, -200.0]  # conditioning targets

# --- Multi-Agent Decision Transformer ---
madt:
  context_length: 20
  n_layers: 3
  n_heads: 4
  embed_dim: 128
  gat_heads: 4                     # graph attention heads
  gat_layers: 2                    # graph attention layers
  dropout: 0.1
  activation: "gelu"
  lr: 1e-4
  weight_decay: 1e-4
  warmup_steps: 1000
  batch_size: 64
  num_epochs: 100
  eval_interval: 10
  target_returns: [0.0, -50.0, -100.0, -200.0]

# --- Baselines ---
baselines:
  ppo:
    total_timesteps: 500000
    learning_rate: 3e-4
    n_steps: 2048
    batch_size: 64
    n_epochs: 10
    gamma: 0.99
    clip_range: 0.2
  dqn:
    total_timesteps: 500000
    learning_rate: 1e-4
    buffer_size: 100000
    batch_size: 32
    gamma: 0.99
    exploration_fraction: 0.3
    target_update_interval: 1000

# --- Evaluation ---
eval:
  num_eval_episodes: 100
  metrics:
    - ev_travel_time
    - background_delay
    - throughput
    - signal_disruptions
    - corridor_green_ratio
  scenarios:
    - "grid-4x4-v0"
    - "grid-6x6-v0"
    - "manhattan-v0"

# --- Logging ---
logging:
  use_wandb: true
  project: "ev-decision-transformer"
  log_interval: 10
  save_model_interval: 20
